<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poets4Life | CEO Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
    </style>
</head>
<body class="bg-[#121212] min-h-screen flex flex-col items-center py-12 px-4 text-white">
    <div class="w-full max-w-md flex flex-col items-center">
        
        <div class="w-32 h-32 mb-4 rounded-full bg-gray-800 flex items-center justify-center border-4 border-[#ff6600] overflow-hidden shadow-[0_0_15px_rgba(255,102,0,0.5)]">
            <img src="https://ui-avatars.com/api/?name=Cooper&background=ff6600&color=fff&size=128" alt="Cooper Profile" class="w-full h-full object-cover">
        </div>
        
        <h1 class="text-3xl font-bold text-[#ff6600] mb-1">Poets4Life</h1>
        <p class="text-gray-400 mb-8 text-center text-sm">CEO Control Center & Status Board</p>

        <div class="w-full bg-[#242424] rounded-xl p-5 shadow-lg border border-gray-700 mb-6">
            <h2 class="text-lg font-semibold mb-4 border-b border-gray-700 pb-2">
                <i class="fa-solid fa-industry text-[#ff6600] mr-2"></i> สถานะโรงงาน (V4-PRD)
            </h2>
            <div class="flex justify-between items-center mb-3">
                <span class="text-gray-300">ระบบอากู๋ (Gemini API)</span>
                <span class="text-green-500 bg-green-500/10 px-3 py-1 rounded-full text-xs font-bold">🟢 รอรับคำสั่ง</span>
            </div>
            <div class="flex justify-between items-center mb-3">
                <span class="text-gray-300">สคริปต์ล่าสุด</span>
                <span class="text-gray-400 text-sm truncate w-32 text-right">รอการอัปเดต...</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-gray-300">แจ้งเตือนระบบ</span>
                <span class="text-gray-500 text-sm">ไม่มี Error </span>
            </div>
        </div>

        <button class="w-full bg-[#ff6600] hover:bg-orange-600 text-white font-bold py-3 px-4 rounded-lg flex items-center justify-center transition duration-300 shadow-lg opacity-50 cursor-not-allowed">
            <i class="fa-solid fa-power-off mr-2"></i> สั่งเปิดสายพานผลิต (เร็วๆ นี้)
        </button>

    </div>
</body>
</html>
